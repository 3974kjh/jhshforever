<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Vertical diamond ring favicon">
  <defs>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="38%" stop-color="#d9e0ea" />
      <stop offset="70%" stop-color="#b5bfce" />
      <stop offset="100%" stop-color="#eef2f8" />
    </linearGradient>
    <linearGradient id="diamond-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#dce5f5" />
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0.6" dy="1" stdDeviation="1" flood-color="#6f7f97" flood-opacity="0.3" />
    </filter>
    <mask id="ring-hole">
      <rect width="64" height="64" fill="#fff" />
      <circle cx="32" cy="38" r="12" fill="#000" />
    </mask>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="32" cy="38" r="17" fill="url(#ring-grad)" mask="url(#ring-hole)" />
    <circle cx="32" cy="38" r="17" fill="none" stroke="#a9b5c7" stroke-width="1.1" />
    <circle cx="32" cy="38" r="12" fill="none" stroke="#8d9bae" stroke-width="0.8" />
    <path d="M20.5 31.5a17 17 0 0 1 23-8.8" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.2" stroke-linecap="round" />
  </g>

  <g filter="url(#shadow)">
    <rect x="29.2" y="18.8" width="5.6" height="4.4" rx="1" fill="#b9c4d4" />
    <polygon points="29.6,11.2 34.4,11.2 38.8,16 32,24 25.2,16" fill="url(#diamond-grad)" stroke="#b6c3d8" stroke-width="0.9" />
    <path d="M30.6 13h2.8l2.2 2.4-3.6 6-3.6-6z" fill="#f8fbff" opacity="0.95" />
  </g>
</svg>